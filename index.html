<!DOCTYPE html>
<!--
  杭州 City Walk
  Made by 阿鸭 · 2026 · Curated by 阿鸭 🦆
  © 转载、分享或二次开发请保留署名。Crafted with care.
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>杭州 City Walk</title>
<meta name="author" content="阿鸭">
<meta name="description" content="杭州 City Walk · Curated by 阿鸭">
<style>
  :root{
    --ink:#1a1b1d; --ink2:#6c7075; --ink3:#a6abab; --line:#ecedeb; --line2:#f4f5f3;
    --surface:#ffffff; --bg:#f5f6f5; --accent:#147d6b; --accent-rgb:20,125,107;
    --eat:#d9644a; --coffee:#9e7a52; --bar:#6d6aa8; --bake:#cf7ba2; --spot:#2f9e7d; --other:#a6abab;
    --sans:-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI','Helvetica Neue',sans-serif;
    --ease:cubic-bezier(.32,.72,0,1);
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; font-family:var(--sans); color:var(--ink); background:var(--bg); }
  ::selection{ background:rgba(var(--accent-rgb),.16); }
  .app{ height:100dvh; max-width:500px; margin:0 auto; display:flex; flex-direction:column; background:var(--bg); position:relative; }

  /* 顶部路线切换 */
  .navhint{ flex:none; display:flex; align-items:center; gap:10px; padding:max(12px,env(safe-area-inset-top)) 16px 7px; background:var(--surface); font-size:11px; font-weight:650; letter-spacing:.07em; color:var(--ink3); }
  .navhint::after{ content:''; flex:1; height:1px; background:var(--line); }
  .chips{ flex:none; display:flex; gap:7px; overflow-x:auto; padding:0 14px 11px; scrollbar-width:none; background:var(--surface); border-bottom:1px solid var(--line); }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{ flex:none; font-size:13px; font-weight:550; padding:7px 13px; border-radius:10px; background:var(--bg); color:var(--ink2); cursor:pointer; white-space:nowrap; transition:all .2s var(--ease); }
  .chip.on{ background:var(--ink); color:#fff; }

  /* 地图：固定上半，常驻可见 */
  .mapbox{ flex:none; height:40vh; position:relative; }
  #map{ position:absolute; inset:0; }
  .amap-controls{ display:none !important; }
  .mapbox .full{ position:absolute; top:10px; right:10px; z-index:55; background:rgba(255,255,255,.94); backdrop-filter:blur(6px); border-radius:8px; padding:7px 12px; font-size:12px; font-weight:550; color:var(--ink); cursor:pointer; box-shadow:0 2px 10px rgba(0,0,0,.1); }
  .mapbox.expand{ position:fixed; inset:0; height:100dvh; z-index:50; }
  .mapbox.expand .full{ top:max(14px,env(safe-area-inset-top)); }
  .catbar{ position:absolute; top:10px; left:10px; right:78px; z-index:6; display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; }
  .catbar::-webkit-scrollbar{ display:none; }
  .catbar .cc{ flex:none; display:inline-flex; align-items:center; gap:4px; font-size:11.5px; font-weight:550; padding:5px 11px; border-radius:8px; background:rgba(255,255,255,.92); backdrop-filter:blur(6px); box-shadow:0 1px 6px rgba(0,0,0,.1); color:var(--ink2); cursor:pointer; white-space:nowrap; }
  .catbar .cc.on{ background:var(--ink); color:#fff; }
  .mapbox.expand .catbar{ top:max(14px,env(safe-area-inset-top)); }

  /* 下半列表 */
  .panel{ flex:1; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; background:var(--bg); border-radius:16px 16px 0 0; margin-top:-14px; box-shadow:0 -2px 12px rgba(0,0,0,.05); position:relative; z-index:2; }
  .panel-in{ padding:6px 18px 40px; }
  .handle{ width:36px; height:5px; border-radius:3px; background:#d8dad7; margin:9px auto 4px; }

  .hero{ padding:8px 0 4px; }
  .hero h1{ font-size:22px; font-weight:680; letter-spacing:-.02em; }
  .hero .theme{ color:var(--ink2); font-size:13px; margin-top:5px; line-height:1.55; }
  .hero .meta{ display:flex; gap:24px; margin-top:12px; }
  .hero .meta b{ font-size:19px; font-weight:660; font-feature-settings:'tnum'; }
  .hero .meta span{ display:block; font-size:11px; color:var(--ink3); }
  .hero .intro{ font-size:13px; color:var(--ink2); line-height:1.72; margin-top:14px; }

  .seclab{ font-size:11px; font-weight:650; letter-spacing:.07em; text-transform:uppercase; color:var(--ink3); margin:22px 0 12px; }

  .timeline{ position:relative; }
  .stop{ position:relative; padding:0 0 0 26px; }
  .stop:not(:last-child){ padding-bottom:16px; }
  .stop::before{ content:''; position:absolute; left:6px; top:7px; bottom:-7px; width:2px; background:var(--line); }
  .stop:last-child::before{ display:none; }
  .stop .pin{ position:absolute; left:0; top:2px; width:14px; height:14px; border-radius:50%; background:var(--surface); border:2px solid var(--accent); }
  .stop .sn{ font-size:15px; font-weight:600; }
  .stop .tk{ font-size:10px; font-weight:550; color:var(--accent); background:rgba(var(--accent-rgb),.1); border-radius:5px; padding:2px 7px; margin-left:7px; vertical-align:1.5px; }
  .stop .sd{ color:var(--ink2); font-size:12.5px; line-height:1.55; margin-top:3px; }

  /* 可折叠分类 */
  .grp{ background:var(--surface); border:1px solid var(--line); border-radius:13px; margin-bottom:10px; overflow:hidden; }
  .grp-h{ display:flex; align-items:center; gap:9px; padding:13px 15px; cursor:pointer; user-select:none; }
  .grp-h .ic{ width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; }
  .grp-h .gn{ font-size:14px; font-weight:600; }
  .grp-h .gc{ font-size:12px; color:var(--ink3); }
  .grp-h .arw{ margin-left:auto; color:var(--ink3); font-size:12px; transition:transform .25s var(--ease); }
  .grp.open .grp-h .arw{ transform:rotate(90deg); }
  .grp-body{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .3s var(--ease); }
  .grp.open .grp-body{ grid-template-rows:1fr; }
  .grp-body > div{ overflow:hidden; }
  .eat{ display:flex; align-items:center; gap:12px; padding:11px 15px; cursor:pointer; transition:background .15s var(--ease); position:relative; border-top:1px solid var(--line2); }
  .eat:active{ background:var(--line2); }
  .eat .en{ font-size:14px; font-weight:550; }
  .eat .ea{ font-size:11px; color:var(--ink3); margin-top:2px; }
  .eat .ed{ margin-left:auto; flex:none; font-size:11.5px; color:var(--ink3); font-feature-settings:'tnum'; }

  .empty{ font-size:13px; color:var(--ink2); text-align:center; padding:24px 10px; line-height:1.7; }

  .card{ font-size:13px; line-height:1.5; max-width:200px; }
  .card .cn{ font-weight:650; font-size:14px; margin-bottom:3px; }
  .card .cd{ color:var(--ink2); }

  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .fade{ animation:fade .38s var(--ease) both; }

  /* 署名 · Curated by 阿鸭 */
  .sig{ text-align:center; font-size:11px; color:var(--ink3); padding:20px 0 4px; letter-spacing:.04em; }
  .sig b{ font-weight:600; color:var(--ink2); }
</style>
</head>
<body>
<div class="app">
  <div class="navhint">路线</div>
  <div class="chips" id="chips"></div>
  <div class="mapbox"><div class="full" id="openFull">⛶ 展开</div><div class="catbar" id="catbar"></div><div id="map"></div></div>
  <div class="panel"><div class="panel-in" id="panel"></div></div>
</div>

<!-- ========== 高德地图 Key 配置 ==========
  下面两个值是前端 key，必然对访问者可见，无法隐藏（环境变量 / 加密都挡不住，
  因为代码和密钥都在用户浏览器里运行，且 key 最终以明文出现在网络请求里）。
  安全性靠高德控制台的【域名白名单】保证：只有绑定的域名能用此 key，被盗用也无效。
  → 配白名单 / 换 key：https://console.amap.com/dev/key/app （服务平台选 Web端(JSAPI)）
  ⚠ 旧 key 已进入公开 git 历史 = 已泄露，建议在控制台重新申请新 key 后替换下面两行。
-->
<script>window._AMapSecurityConfig={securityJsCode:'4822694c09fb8c77c97a21e81c264801'};</script>
<script src="https://webapi.amap.com/maps?v=2.0&key=ade75e62f7ec90f8599d14a0fc10ab4b"></script>
<script>
/* ── 署名 · Curated by 阿鸭 ── */
const _CREDIT='Curated by 阿鸭 · 杭州 City Walk';
try{ console.log('%c🦆 '+_CREDIT,'font:600 13px sans-serif;color:#147d6b;padding:2px 0'); }catch(e){}
const ICON={
  utensils:'<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>',
  coffee:'<path d="M10 2v2"/><path d="M14 2v2"/><path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h14a4 4 0 1 1 0 8h-1"/><path d="M6 2v2"/>',
  martini:'<path d="M12 12 4.207 4.207A.707.707 0 0 1 4.707 3h14.586a.707.707 0 0 1 .5 1.207z"/><path d="M12 12v10"/><path d="M7 22h10"/>',
  cake:'<path d="M16 13H3"/><path d="M16 17H3"/><path d="m7.2 7.9-3.388 2.5A2 2 0 0 0 3 12.01V20a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1v-8.654c0-2-2.44-6.026-6.44-8.026a1 1 0 0 0-1.082.057L10.4 5.6"/><circle cx="9" cy="7" r="2"/>',
  mountain:'<path d="m8 3 4 8 5-5 5 15H2L8 3z"/>',
  pin:'<path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/>',
};
const svgIcon=(id,color,size)=>`<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" style="display:block">${ICON[id]||ICON.pin}</svg>`;
const CAT=[['吃饭','餐厅','#d9644a','utensils'],['咖啡','咖啡','#9e7a52','coffee'],['清吧','清吧','#6d6aa8','martini'],['面包甜品','面包甜品','#cf7ba2','cake'],['景点','景点','#2f9e7d','mountain'],['其他','其他','#a6abab','pin']];
const CC=Object.fromEntries(CAT.map(c=>[c[0],c[2]])), CL=Object.fromEntries(CAT.map(c=>[c[0],c[1]])), CI=Object.fromEntries(CAT.map(c=>[c[0],c[3]]));
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const parse=s=>{ if(!s||typeof s!=='string')return null; const a=s.split(',').map(Number); return (a.length===2&&Number.isFinite(a[0])&&Number.isFinite(a[1]))?a:null; };

let MAP,INFO,ROUTES,POIS,cur,activeCat=null;
let routeLine,stopMarkers=[],poiMarkers=[],nameMarker={},activeKey=null;

function clearMap(){ if(routeLine)routeLine.forEach(l=>l.setMap(null)); routeLine=null;
  stopMarkers.forEach(m=>m.setMap(null)); stopMarkers=[]; poiMarkers.forEach(o=>o.m.setMap(null)); poiMarkers=[]; nameMarker={}; INFO&&INFO.close(); activeKey=null; }
function poiEl(c,id,active){ const sz=active?26:22, isz=active?15:13;
  return `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:#fff;border:2px solid ${c};display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.28);opacity:${active||!activeKey?1:.45};transition:all .25s ease">${svgIcon(id,c,isz)}</div>`; }

function drawRoute(r,list){
  routeLine=[];
  if(r&&r.walk_path&&r.walk_path.length>1){
    routeLine.push(new AMap.Polyline({path:r.walk_path,strokeColor:'#147d6b',strokeWeight:10,strokeOpacity:.18,lineJoin:'round',map:MAP,zIndex:40}));
    routeLine.push(new AMap.Polyline({path:r.walk_path,strokeColor:'#147d6b',strokeWeight:4,strokeOpacity:1,lineJoin:'round',map:MAP,zIndex:41}));
  }
  if(r)r.stops.forEach((s,i)=>{ const ll=parse(s.location); if(!ll)return;
    const m=new AMap.Marker({position:ll,map:MAP,zIndex:200,offset:new AMap.Pixel(-13,-13),
      content:`<div style="width:26px;height:26px;border-radius:50%;background:#147d6b;color:#fff;font:600 13px var(--sans),sans-serif;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)">${s.order||i+1}</div>`});
    m.on('click',()=>{INFO.setContent(`<div class="card"><div class="cn">${esc(s.name)}</div><div class="cd">${esc(s.ticket||'')} ${esc(s.desc||'')}</div></div>`);INFO.open(MAP,ll);});
    stopMarkers.push(m); nameMarker['s:'+s.name]=m;
  });
  list.forEach(p=>{ const ll=parse(p.location); if(!ll)return; const c=CC[p.cat]||CC['其他'];
    const m=new AMap.Marker({position:ll,map:MAP,zIndex:60,offset:new AMap.Pixel(-11,-11),content:poiEl(c,CI[p.cat]||'pin',false)});
    m.on('click',()=>activatePoi(p.name));
    poiMarkers.push({m,p,c}); nameMarker['p:'+p.name]=m;
  });
}
function refreshPoi(){ poiMarkers.forEach(({m,p,c})=>m.setContent(poiEl(c,CI[p.cat]||'pin',activeKey===p.name))); }
function activatePoi(name){ const it=poiMarkers.find(o=>o.p.name===name); if(!it)return; activeKey=name; refreshPoi();
  const ll=parse(it.p.location); MAP.setZoomAndCenter(16,ll,true,460);
  INFO.setContent(`<div class="card"><div class="cn">${esc(it.p.name)}</div><div class="cd">${esc(it.p.cat)} · ${esc(it.p.addr||'')}</div></div>`); INFO.open(MAP,ll); }
function fitMap(){ const ov=[]; if(routeLine)ov.push(...routeLine); ov.push(...stopMarkers); poiMarkers.forEach(o=>ov.push(o.m));
  const f=ov.filter(o=>o.getPosition||o.getPath); if(f.length)MAP.setFitView(f,false,[44,44,44,44],16); }

function listFor(k){ const f=p=>p.location && !/绿茶/.test(p.name);
  return k==='other'?POIS.filter(p=>!p.route).filter(f):POIS.filter(p=>p.route===k).filter(f); }
function pathKm(path){ let d=0; for(let i=1;i<path.length;i++){ const dx=(path[i][0]-path[i-1][0])*96,dy=(path[i][1]-path[i-1][1])*111; d+=Math.sqrt(dx*dx+dy*dy);} return d.toFixed(1); }

function render(){
  const isOther=(cur==='other'); const r=isOther?null:ROUTES.find(x=>x.no===cur);
  const fullList=listFor(cur);
  const list=activeCat?fullList.filter(p=>p.cat===activeCat):fullList;
  clearMap(); drawRoute(r,list); fitMap();
  const _cats=CAT.filter(([c])=>fullList.some(p=>p.cat===c)); const _cb=document.getElementById('catbar');
  _cb.innerHTML=`<div class="cc${!activeCat?' on':''}" data-c="">全部 ${fullList.length}</div>`+_cats.map(([c,label])=>`<div class="cc${activeCat===c?' on':''}" data-c="${c}">${svgIcon(CI[c],'currentColor',13)}${label}</div>`).join('');
  _cb.querySelectorAll('.cc').forEach(el=>el.onclick=()=>{ activeCat=el.dataset.c||null; render(); });
  const panel=document.getElementById('panel'); panel.parentElement.scrollTop=0;
  let h=`<div class="hero fade">`;
  if(isOther) h+=`<h1>城中其它</h1><div class="theme">不在任一徒步线 3 公里内、值得专程去的收藏（武林·城东·滨江）</div>`;
  else h+=`<h1>${esc(r.name.split('·')[0])}</h1><div class="theme">${esc(r.area)} · ${esc(r.theme||'')}</div>`
    +`<div class="meta"><div><b>${r.stops.length}</b><span>个景点</span></div>`
    +(r.walk_path&&r.walk_path.length>1?`<div><b>${pathKm(r.walk_path)}</b><span>公里步行</span></div>`:'')+`</div>`+(r.intro?`<div class="intro">${esc(r.intro)}</div>`:'');
  h+=`</div>`;
  if(!isOther){ h+=`<div class="seclab">行程 · ${r.stops.length} 站</div><div class="timeline">`
    +r.stops.map(s=>`<div class="stop"><div class="pin"></div><div class="sn">${esc(s.name)}${s.ticket?`<span class="tk">${esc(s.ticket)}</span>`:''}</div><div class="sd">${esc(s.desc||'')}</div></div>`).join('')+`</div>`; }
  h+=`<div class="seclab">${isOther?'城中收藏':'沿途吃喝'} · ${list.length} 处</div>`;
  if(!list.length) h+=`<div class="empty">这条线 3 公里内还没有收录的店</div>`;
  else h+=CAT.map(([cat,label,col,id])=>{ const items=list.filter(p=>p.cat===cat); if(!items.length)return '';
    const open=items.length<=5;  // 5 个以内默认展开，多的收起
    return `<div class="grp${open?' open':''}" data-cat="${cat}"><div class="grp-h"><span class="ic">${svgIcon(id,col,16)}</span><span class="gn">${label}</span><span class="gc">${items.length}</span><span class="arw">▸</span></div>`
      +`<div class="grp-body"><div>`
      +items.map(p=>`<div class="eat" data-n="${esc(p.name)}"><div><div class="en">${esc(p.name)}</div><div class="ea">${esc(p.addr||'')}</div></div>`
        +(p.route_dist?`<span class="ed">${(p.route_dist/1000).toFixed(1)} km</span>`:'')+`</div>`).join('')
      +`</div></div></div>`; }).join('');
  h+=`<div class="sig">🦆 <b>Curated by 阿鸭</b> · 杭州 City Walk</div>`;
  panel.innerHTML=h;
  panel.querySelectorAll('.grp-h').forEach(hd=>hd.onclick=()=>hd.parentElement.classList.toggle('open'));
  panel.querySelectorAll('.eat').forEach(el=>el.onclick=e=>{ e.stopPropagation(); activatePoi(el.dataset.n); });
}

async function main(){
  [ROUTES,POIS]=await Promise.all([
    fetch('data/routes-final.json').then(r=>r.json()).then(d=>d.routes),
    fetch('data/pois-final.json').then(r=>r.json())]);
  const cnt={}; POIS.forEach(p=>{if(p.route)cnt[p.route]=(cnt[p.route]||0)+1;});
  cur=ROUTES.reduce((b,r)=>(cnt[r.no]||0)>(cnt[b.no]||0)?r:b,ROUTES[0]).no;

  MAP=new AMap.Map('map',{zoom:13,center:[120.15,30.27],viewMode:'2D',mapStyle:'amap://styles/whitesmoke'});
  INFO=new AMap.InfoWindow({offset:new AMap.Pixel(0,-15)});

  const chips=document.getElementById('chips');
  const mk=(label,k)=>{ const el=document.createElement('div'); el.className='chip'+(k===cur?' on':''); el.textContent=label;
    el.onclick=()=>{ cur=k; activeCat=null; [...chips.children].forEach(c=>c.classList.remove('on')); el.classList.add('on'); render(); };
    chips.appendChild(el); };
  ROUTES.forEach(r=>mk(r.name.split('·')[0],r.no)); mk('城中其它','other');

  const _mb=document.querySelector('.mapbox'), _fb=document.getElementById('openFull');
  _fb.onclick=()=>{ const ex=_mb.classList.toggle('expand'); _fb.textContent=ex?'✕ 收起':'⛶ 展开';
    setTimeout(()=>{ try{ MAP.resize && MAP.resize(); }catch(e){} fitMap(); }, 60); };
  render();
  window.addEventListener('resize',fitMap);
}
main().catch(e=>document.body.insertAdjacentHTML('beforeend',`<div style="position:fixed;top:50%;left:0;right:0;text-align:center;color:#d9644a">加载失败：${esc(e.message)}</div>`));
</script>
</body>
</html>
